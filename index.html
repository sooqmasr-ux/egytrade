-bottom:12px;font-size:11px"><div style="color:#86efac;font-weight:700">✅ ${AR()?r.ag.ar:r.ag.en} — ${r.ag.disc}%</div><div style="color:#4ade80;margin-top:3px">📋 ${AR()?r.ag.da:r.ag.de}</div></div>`:''} ${[[AR()?'قيمة CIF':'CIF Value',r.cif,'#e2e8f0'],[AR()?`رسوم جمركية (${r.rate.toFixed(1)}%)`:`Duty (${r.rate.toFixed(1)}%)`,r.duty,'#fbbf24'],[AR()?'ضريبة القيمة المضافة':'VAT',r.vat,'#fbbf24'],...(r.goeic>0?[[AR()?'رسوم GOEIC':'GOEIC',r.goeic,'#fbbf24']]:[]),[AR()?'رسوم الميناء':'Port',r.port,'#fbbf24']].map(([l,v,c])=>`<div class="crow"><span style="font-size:12px;color:var(--mt)">${l}</span><span style="color:${c};font-weight:700">${usd(v)}</span></div>`).join('')}<div style="display:flex;justify-content:space-between;padding:12px 0 0;border-top:1px solid rgba(201,168,76,.2);margin-top:6px"><span style="font-size:14px;color:var(--gold);font-weight:900">${AR()?'الإجمالي':'TOTAL'}</span><span style="font-size:20px;color:var(--gold);font-weight:900">${usd(r.total)}</span></div>${r.sv>50?`<div style="background:rgba(34,197,94,.08);border-radius:9px;padding:8px 12px;margin-top:10px;font-size:12px;color:#86efac">💰 ${AR()?'توفير:':'Savings:'} <strong>${usd(r.sv)}</strong></div>`:''}</div>`:`<div class="card" style="text-align:center;padding:32px;color:var(--mt)">⚖️ ${AR()?'اختر المنتج والقيمة والدولة':'Select product, value and country'}</div>`}`}
function sHS(ch,nm){ST.hsc=ch;ST.hss=nm;ra()}
function pAGR(el){el.innerHTML=`<h2 class="g" style="margin-bottom:6px">🤝 ${AR()?'الاتفاقيات التجارية لمصر':'Egypt Trade Agreements'}</h2><p style="margin-bottom:16px">${AR()?'استخدم الاتفاقية الصحيحة ووفّر ملايين الدولارات':'Use the right agreement and save millions'}</p>${Object.entries(AGR).map(([k,ag])=>`<div class="agc" style="border-color:${ag.col}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><h3 style="font-size:14px;font-weight:700;color:${ag.col}">${AR()?ag.ar:ag.en}</h3><span style="font-size:10px;padding:3px 10px;border-radius:100px;font-weight:700;background:${ag.col}20;color:${ag.col}">${ag.disc===100?(AR()?'صفر':'Zero'):`-${ag.disc}%`}</span></div><div style="font-size:11px;color:var(--mt);margin-bottom:8px;line-height:1.7">${(AR()?ag.ca:ag.ce).slice(0,6).join(' • ')}${(AR()?ag.ca:ag.ce).length>6?' ...':''}</div><div style="padding:7px 11px;background:${ag.col}0a;border-radius:8px;font-size:11px;color:var(--tx)">📋 ${AR()?ag.da:ag.de}</div></div>`).join('')}`}
function pI(el){el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2 class="g">🎯 ${AR()?'الفرص التجارية الحية':'Live Trade Intelligence'}</h2><div style="display:flex;align-items:center;gap:5px"><div class="dot" style="background:#22c55e"></div><span style="font-size:10px;color:#22c55e;font-weight:700">LIVE</span></div></div><p style="margin-bottom:14px">${AR()?'محدثة من 50+ مصدر دولي كل ساعة':'Updated from 50+ international sources every hour'}</p>${OPP.map(o=>`<div class="ic" style="border-color:${o.col}"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="display:flex;gap:10px"><span style="font-size:24px">${o.f}</span><div>${o.hot?`<span style="font-size:8px;padding:2px 6px;background:rgba(239,68,68,.2);border-radius:100px;color:#fca5a5;font-weight:700">🔥 HOT</span>`:''}<div style="font-size:13px;font-weight:700;color:var(--tx);margin-top:3px">${AR()?o.tia:o.tie}</div></div></div><div style="text-align:center;flex-shrink:0"><div style="font-size:15px;font-weight:900;color:${o.col}">${o.conf}%</div><div style="font-size:8px;color:var(--mt)">${AR()?'ثقة':'conf'}</div></div></div><div style="padding:6px 10px;background:${o.col}08;border-radius:7px;font-size:11px;color:var(--mt);margin-bottom:8px">${AR()?o.da:o.de}</div><button class="btn bo sm" onclick="gt('ai')">${AR()?'تحليل بـ EgyAI ←':'Analyze with EgyAI →'}</button></div>`).join('')}`}
function pG(el){const q=sc(ST.hss||'',80).toLowerCase();const flt=GV.filter(g=>!q||g.ar.includes(q)||g.en.toLowerCase().includes(q)||[...g.pa,...g.pe].some(p=>p.toLowerCase().includes(q)));el.innerHTML=`<h2 class="g" style="margin-bottom:12px">🗺️ ${AR()?'27 محافظة مصرية':'27 Egyptian Governorates'}</h2><input class="inp" style="margin-bottom:14px" value="${sc(ST.hss||'')}" oninput="ST.hss=this.value;ra()" placeholder="${AR()?'ابحث...':'Search...'}"/><div class="ggr">${flt.map(g=>`<div class="gc ${ST.gov?.c===g.c?'act':''}" onclick="selG('${g.c}')"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:13px;font-weight:700;color:${ST.gov?.c===g.c?'#c9a84c':'#e2e8f0'}">${AR()?g.ar:g.en}</span>${g.v?`<span style="font-size:7px;padding:1px 5px;background:rgba(34,197,94,.15);border-radius:100px;color:#4ade80;font-weight:700">✓</span>`:''}</div><div style="font-size:9px;color:var(--mt)">${(AR()?g.pa:g.pe).slice(0,2).join(' · ')}</div></div>`).join('')}</div>${ST.gov?`<div style="background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.22);border-radius:14px;padding:16px;margin-top:14px"><h3 style="color:var(--gold);margin-bottom:12px">${AR()?ST.gov.ar:ST.gov.en}</h3><div style="font-size:11px;color:var(--mt);margin-bottom:6px">${AR()?'المنتجات:':'Products:'}</div>${(AR()?ST.gov.pa:ST.gov.pe).map(p=>`<div style="font-size:12px;color:var(--tx);padding:2px 0">▸ ${p}</div>`).join('')}<div style="margin-top:10px;font-size:11px;color:var(--mt)">${AR()?'المنفذ:':'Port:'}</div><div style="font-size:12px;color:var(--gold)">${AR()?ST.gov.pra:ST.gov.pre}</div><div style="margin-top:8px;font-size:11px;color:var(--mt)">${AR()?'الغرفة التجارية:':'Chamber:'}</div><div style="font-size:12px;color:var(--tx)">📞 ${ST.gov.ph}</div></div>`:''}`;
}
function selG(c){const g=GV.find(x=>x.c===c);ST.gov=ST.gov?.c===c?null:g;ra()}
function pSK(el){el.innerHTML=`<h2 class="g" style="margin-bottom:6px">⚙️ ${AR()?'نظام المهارات':'Skills System'}</h2><p style="margin-bottom:16px">${AR()?'أوامر جاهزة بضغطة واحدة':'One-click ready commands'}</p>${SK.map(sk=>`<div class="card ch" style="border-color:rgba(34,197,94,.15)" onclick="gt('ai');setTimeout(()=>{const ta=document.getElementById('aq');if(ta){const v='${AR()?"":""}';ta.value='${AR()?sk.c.replace('/',' ').trim():sk.e.replace('/',' ').trim()}';ST.q=ta.value}},100)"><div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:22px">${sk.i}</span><div><div style="font-size:11px;font-weight:700;color:#22c55e;font-family:monospace;margin-bottom:4px">${AR()?sk.c:sk.e}</div><div style="font-size:11px;color:var(--mt)">${AR()?sk.a:sk.en}</div><div style="font-size:10px;color:#334155;margin-top:5px">${AR()?'اضغط ←':'Click →'}</div></div></div></div>`).join('')}`}
