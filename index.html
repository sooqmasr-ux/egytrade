function setupPWA(){
  // Create PNG icon as canvas data URL
  const c=document.createElement('canvas');c.width=512;c.height=512;
  const ctx=c.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,512,512);
  grad.addColorStop(0,'#c9a84c');grad.addColorStop(1,'#8b6914');
  ctx.fillStyle=grad;
  // Rounded rect
  const r=80;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(512-r,0);ctx.quadraticCurveTo(512,0,512,r);ctx.lineTo(512,512-r);ctx.quadraticCurveTo(512,512,512-r,512);ctx.lineTo(r,512);ctx.quadraticCurveTo(0,512,0,512-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#020810';ctx.font='bold 320px Cairo, sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('E',256,280);
  const icon512=c.toDataURL('image/png');
  // 192 version
  c.width=192;c.height=192;
  const g2=ctx.createLinearGradient(0,0,192,192);g2.addColorStop(0,'#c9a84c');g2.addColorStop(1,'#8b6914');
  ctx.fillStyle=g2;const r2=30;ctx.beginPath();ctx.moveTo(r2,0);ctx.lineTo(192-r2,0);ctx.quadraticCurveTo(192,0,192,r2);ctx.lineTo(192,192-r2);ctx.quadraticCurveTo(192,192,192-r2,192);ctx.lineTo(r2,192);ctx.quadraticCurveTo(0,192,0,192-r2);ctx.lineTo(0,r2);ctx.quadraticCurveTo(0,0,r2,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#020810';ctx.font='bold 120px Cairo, sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('E',96,105);
  const icon192=c.toDataURL('image/png');

  // Manifest
  const manifest={name:'EgyTrade OS',short_name:'EgyTrade',description:'نظام التشغيل التجاري المصري الأول',start_url:'.',display:'standalone',background_color:'#020810',theme_color:'#c9a84c',orientation:'portrait-primary',lang:'ar',dir:'rtl',icons:[{src:icon192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:icon512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  const mb=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const ml=document.querySelector('link[rel="manifest"]')||document.createElement('link');
  ml.rel='manifest';ml.href=URL.createObjectURL(mb);
  if(!document.querySelector('link[rel="manifest"]'))document.head.appendChild(ml);

  // Apple touch icon
  const al=document.createElement('link');al.rel='apple-touch-icon';al.href=icon192;document.head.appendChild(al);

  // Service Worker
  if('serviceWorker' in navigator){
    const sw=`
const CV='egytrade-v2';
const URLS=['/','./index.html'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CV).then(c=>c.addAll(URLS).catch(()=>{})));self.skipWaiting()});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CV).map(k=>caches.delete(k)))));self.clients.claim()});
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(nr=>{const cl=nr.clone();caches.open(CV).then(c=>c.put(e.request,cl));return nr}).catch(()=>caches.match('./index.html'))))});
    `;
    const sb=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(sb),{scope:'./'}).catch(()=>{});
  }
}
